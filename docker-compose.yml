services:
  mysql:
    image: mysql:8.0
    container_name: mecw_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-workflow_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-workflow_db}
      MYSQL_USER: ${MYSQL_USER:-workflow_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-workflow_password}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
